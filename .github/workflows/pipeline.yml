name: Enterprise Workforce Analytics Pipeline

on:
  schedule:
    - cron: '0 2 * * *'   # Daily 2:00 AM UTC
  workflow_dispatch:        # Manual trigger button in GitHub Actions tab

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install \
            google-cloud-bigquery \
            pandas \
            pandas-gbq \
            requests \
            faker \
            tqdm \
            python-dateutil \
            db-dtypes

      - name: Create GCP credentials file
        run: echo '${{ secrets.GCP_KEY_JSON }}' > gcp-key.json

      - name: Run Bronze pipeline
        env:
          OXR_APP_ID: ${{ secrets.OXR_APP_ID }}
        run: python python_etl/data_gen_v13_6.py
